# 100-Bagger Data Sources Configuration
# Copy this file to data_sources.yaml and fill in your API keys

api_keys:
  # Financial Modelling Prep — primary fundamentals source
  # Sign up at: https://financialmodelingprep.com/
  fmp_api_key: "YOUR_FMP_API_KEY_HERE"

  # Anthropic Claude — for qualitative overlay (optional)
  # Sign up at: https://console.anthropic.com/
  anthropic_api_key: "YOUR_ANTHROPIC_API_KEY_HERE"

rate_limits:
  yfinance:
    max_requests_per_hour: 2000
    delay_between_requests_ms: 200
  fmp:
    max_requests_per_day: 250    # Free tier; upgrade for more
    delay_between_requests_ms: 500
  anthropic:
    max_requests_per_minute: 50

cache:
  enabled: true
  directory: ".cache/data"
  ttl_prices_seconds: 3600       # 1 hour for price data
  ttl_financials_seconds: 86400  # 24 hours for financial statements
  ttl_fx_rates_seconds: 3600     # 1 hour for exchange rates

notifications:
  # Email notifications (optional)
  email:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender: "your-email@gmail.com"
    password: "YOUR_APP_PASSWORD"
    recipients:
      - "recipient@example.com"

  # Telegram notifications (optional)
  telegram:
    enabled: false
    bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
    chat_id: "YOUR_CHAT_ID"
